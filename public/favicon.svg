<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" width="140" height="120">
  <!-- Hand-drawn ink style on transparent background -->

  <!-- PINT GLASS — added on left -->
  <g transform="translate(8, 36)">
    <!-- Foam (wobbly) -->
    <path d="M 1 6 Q 3 1 5 3 Q 8 0 11 2 Q 14 1 16 6 Z"
          fill="#fdfaf3" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Glass with beer (slightly tapered) -->
    <path d="M 1 6 L 16 6 L 14 28 Q 14 30 12 30 L 5 30 Q 3 30 3 28 Z"
          fill="#f0c060" stroke="#1a1a1a" stroke-width="2.2" stroke-linejoin="round"/>
  </g>

  <!-- HAIR — wobbly zigzag tufts on top -->
  <path d="M 56 18 L 60 8 L 65 16 L 70 6 L 75 16 L 80 8 L 84 18"
        fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- HEAD — wobbly circle, hand-drawn imperfect -->
  <path d="M 50 22
           Q 44 30 45 42
           Q 46 56 53 64
           Q 65 72 80 68
           Q 92 62 93 48
           Q 94 32 86 24
           Q 75 18 62 19
           Q 54 20 50 22 Z"
        fill="none" stroke="#1a1a1a" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- LEFT eye — bigger, wide circle -->
  <ellipse cx="60" cy="38" rx="9" ry="10" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="60" cy="40" r="2.5" fill="#1a1a1a"/>

  <!-- RIGHT eye — slightly smaller, pupil offset -->
  <ellipse cx="78" cy="38" rx="8" ry="9" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="77" cy="40" r="2.2" fill="#1a1a1a"/>

  <!-- MOUTH — huge open grin, wide curve -->
  <path d="M 52 53 Q 70 70 87 53"
        fill="none" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TEETH — square teeth hanging from top of mouth, like the drawing -->
  <g stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round" fill="none">
    <path d="M 55 54 L 55 61 L 60 62 L 60 55"/>
    <path d="M 60 55 L 60 62 L 65 63 L 65 55"/>
    <path d="M 65 55 L 65 63 L 70 64 L 70 55"/>
    <path d="M 70 55 L 70 64 L 75 63 L 75 55"/>
    <path d="M 75 55 L 75 63 L 80 62 L 80 55"/>
    <path d="M 80 55 L 80 62 L 84 60 L 84 54"/>
  </g>

  <!-- THUMBS UP — on the right -->
  <g transform="translate(96, 40)" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round" fill="none">
    <!-- Thumb sticking up -->
    <path d="M 6 0 Q 4 -10 9 -11 Q 14 -10 12 0"/>
    <!-- Fist body -->
    <path d="M 0 0 Q 0 -2 3 -2 L 15 -2 Q 18 -2 18 3 L 18 14 Q 18 18 14 18 L 4 18 Q 0 18 0 14 Z"/>
    <!-- Knuckle line on fist -->
    <path d="M 3 7 Q 9 9 16 7" stroke-linecap="round"/>
    <!-- Wrist -->
    <path d="M 4 18 L 4 24 L 14 24 L 14 18"/>
  </g>
</svg>
